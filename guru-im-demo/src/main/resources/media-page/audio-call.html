<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音通话</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/audio-call.css">
</head>
<body>
<div class="audio-call-container">
    <!-- 现有内容保持不变 -->
    <div class="header" id="header">
        <div class="call-title">语音通话</div>
        <div class="timer" id="timer">00:00</div>
    </div>

    <div class="content-area">
        <div class="audio-visualizer">
            <div class="device-selector" id="deviceSelector">
                <div class="device-header">
                    <span>设备设置</span>
                    <i class="fas fa-times close-devices" id="closeDevices"></i>
                </div>
                <div class="device-group">
                    <label>麦克风</label>
                    <select class="device-select" id="audioDeviceSelect">
                        <option value="">选择麦克风</option>
                    </select>
                </div>
                <div class="device-group">
                    <label>扬声器</label>
                    <select class="device-select" id="speakerSelect">
                        <option value="">选择扬声器</option>
                    </select>
                </div>
            </div>

            <div class="user-section">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userName">用户</div>
                    <div class="call-status-container">
                        <div class="call-status" id="callStatus">准备通话...</div>
                        <div class="call-timer" id="callTimer">00:00</div>
                    </div>
                </div>
            </div>

            <div class="audio-bars" id="audioBars">
                <!-- 音频可视化条将通过JS动态生成 -->
            </div>

            <div class="incoming-call-actions hidden" id="incomingCallActions">
                <button class="action-btn reject-btn" id="rejectCallBtn">
                    <i class="fas fa-phone-slash"></i>
                </button>
                <button class="action-btn accept-btn" id="acceptCallBtn">
                    <i class="fas fa-phone"></i>
                </button>
            </div>

            <div class="outgoing-call-actions hidden" id="outgoingCallActions">
                <button class="action-btn hangup-action-btn" id="outgoingHangupBtn">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="controls" id="controls">
        <button class="control-btn" id="muteBtn" title="静音">
            <i class="fas fa-microphone"></i>
            <div class="tooltip">静音</div>
        </button>
        <button class="control-btn hangup-btn" id="hangupBtn" title="挂断">
            <i class="fas fa-phone-slash"></i>
            <div class="tooltip">挂断</div>
        </button>
        <button class="control-btn" id="deviceBtn" title="设备">
            <i class="fas fa-cog"></i>
            <div class="tooltip">设备</div>
        </button>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div>初始化设备中...</div>
</div>

<!-- 音频元素 -->
<audio id="ringtone" loop preload="auto">
    <source src="./sounds/ring_tone.mp3" type="audio/mpeg">
</audio>

<audio id="callTone" loop preload="auto">
    <source src="./sounds/call_tone.mp3" type="audio/mpeg">
</audio>

<audio id="hangupTone" preload="auto">
    <source src="./sounds/hangup_tone.mp3" type="audio/mpeg">
</audio>

<!-- 脚本文件 -->
<script src="./js/dist/mediasoup-client.min.js"></script>
<script src="./js/core/common.js"></script>
<script src="./js/core/device-manager.js"></script>
<script src="./js/core/signaling-handler.js"></script>
<script src="./js/core/mediasoup-client.js"></script>
<script src="./js/audio-call.js"></script>
</body>
</html>
